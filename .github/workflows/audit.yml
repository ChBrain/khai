# Audit lane. Drives the NLP review as an audit PR (see audit/README.md).
#
# Two jobs, two lanes:
#   review       calls the model (cost), so it runs only on PR open/reopen, a
#                `/audit` comment, or manual dispatch. It reviews each audit, reads
#                the PR's comment treatments into the ledger (the comment -> table
#                sync), commits ledger + log + meta, and posts NEW findings as
#                inline comments. Advisory: it never fails the build. Re-running
#                `/audit` after treating findings is what syncs and re-checks them.
#   consistency  the deterministic required check, no model calls. Runs on each
#                push (so it re-fires after the review's PAT commit). It gates on
#                freshness (the audit ran against current content) and on the
#                table agreeing with the comments. This, plus GitHub's "require
#                conversation resolution", holds the audit PR until the table is ok.
#
# The review job checks out and pushes with the KHAI PAT, not GITHUB_TOKEN: a
# GITHUB_TOKEN push does not trigger further runs, so the consistency check would
# never re-fire after the review commits. The logic both jobs call is unit-tested
# in @chbrain/khai-review.

name: audit

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths: ["audit/**"]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  review:
    name: review (model, advisory)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action != 'synchronize') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/audit'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR context
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            let pr = context.payload.pull_request;
            if (!pr && context.payload.issue) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              pr = data;
            }
            if (!pr) { core.setFailed("no PR context"); return; }
            core.setOutput("number", pr.number);
            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("base_ref", pr.base.ref);

      # Check out (and later push) with the KHAI PAT, not GITHUB_TOKEN: a commit
      # pushed by GITHUB_TOKEN does NOT trigger further workflow runs, so the
      # consistency check would never re-run after the review commits meta + log.
      # The PAT push fires the synchronize event, so consistency re-evaluates.
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.KHAI }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      # Read the PR's comment treatments, so the review can sync them into the
      # ledger (Accept / Reduce / Transfer the human recorded on each finding).
      - name: Fetch review threads
        uses: actions/github-script@v7
        with:
          script: |
            const q = `query($owner:String!,$repo:String!,$num:Int!){
              repository(owner:$owner,name:$repo){
                pullRequest(number:$num){
                  reviewThreads(first:100){ nodes { isResolved comments(first:50){ nodes { body } } } }
                }
              }
            }`;
            const r = await github.graphql(q, {
              owner: context.repo.owner, repo: context.repo.repo,
              num: Number("${{ steps.ctx.outputs.number }}"),
            });
            const threads = r.repository.pullRequest.reviewThreads.nodes.map((t) => ({
              isResolved: t.isResolved,
              comments: t.comments.nodes.map((c) => ({ body: c.body })),
            }));
            require("fs").writeFileSync("/tmp/threads.json", JSON.stringify(threads));

      - name: Run the audits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          mkdir -p /tmp/audit-new
          node .github/scripts/audit-decisions.mjs /tmp/threads.json > /tmp/decisions.json
          # "/audit <id>" runs that named audit on demand, regardless of the diff;
          # otherwise run whatever audit manifest the PR changed.
          named=$(printf '%s' "$COMMENT_BODY" | sed -n 's#^/audit[[:space:]]\+\([A-Za-z0-9._-]\+\).*#\1#p')
          if [ -n "$named" ] && [ -f "audit/$named/audit.json" ]; then
            manifests="audit/$named/audit.json"
          else
            git fetch origin "${{ steps.ctx.outputs.base_ref }}" --depth=1
            manifests=$(git diff --name-only "origin/${{ steps.ctx.outputs.base_ref }}...HEAD" -- 'audit/*/audit.json' || true)
          fi
          if [ -z "$manifests" ]; then echo "no audits to run"; exit 0; fi
          for m in $manifests; do
            id=$(basename "$(dirname "$m")")
            node packages/khai-review/cli.mjs --manifest "$m" \
              --decisions /tmp/decisions.json --new "/tmp/audit-new/$id.json"
            # Stamp meta.json with the content just reviewed, so the freshness
            # gate can prove this audit ran against the current content.
            node .github/scripts/audit-stamp.mjs "$m"
          done

      - name: Commit ledger + log
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audit/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "audit: update ledger + log"
            git push origin HEAD:"${{ steps.ctx.outputs.head_ref }}"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Post new findings as inline comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const dir = "/tmp/audit-new";
            if (!fs.existsSync(dir)) return;
            const commit_id = "${{ steps.commit.outputs.sha }}";
            const pull_number = Number("${{ steps.ctx.outputs.number }}");
            for (const file of fs.readdirSync(dir)) {
              const comments = JSON.parse(fs.readFileSync(`${dir}/${file}`, "utf8"));
              for (const c of comments) {
                if (!c.line) continue;
                try {
                  await github.rest.pulls.createReviewComment({
                    owner: context.repo.owner, repo: context.repo.repo,
                    pull_number, commit_id, path: c.path, line: c.line, side: "RIGHT",
                    body: c.body,
                  });
                } catch (err) {
                  core.warning(`could not post comment for ${c.id}: ${err.message}`);
                }
              }
            }

  consistency:
    name: consistency (required)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      # Scope every gate below to only the audits this PR touches, so one audit's
      # PR is never blocked by another audit's state.
      - name: Determine audits on this PR
        id: scope
        run: |
          base="${{ github.event.pull_request.base.ref || 'main' }}"
          git fetch origin "$base" --depth=1 || true
          ids=$(git diff --name-only "origin/$base...HEAD" -- 'audit/**' 2>/dev/null \
            | sed -n 's#^audit/\([^/]*\)/.*#\1#p' | sort -u | tr '\n' ' ')
          echo "ids=$ids" >> "$GITHUB_OUTPUT"
          echo "audits on this PR: ${ids:-<none>}"

      - name: Freshness — every audit ran against the current content
        if: steps.scope.outputs.ids != ''
        run: |
          manifests=""
          for id in ${{ steps.scope.outputs.ids }}; do
            [ -f "audit/$id/audit.json" ] && manifests="$manifests audit/$id/audit.json"
          done
          [ -z "$manifests" ] && { echo "no audit manifests touched"; exit 0; }
          node .github/scripts/audit-freshness.mjs $manifests

      - name: Fetch review threads
        if: github.event.pull_request != null
        uses: actions/github-script@v7
        with:
          script: |
            const q = `query($owner:String!,$repo:String!,$num:Int!){
              repository(owner:$owner,name:$repo){
                pullRequest(number:$num){
                  reviewThreads(first:100){ nodes { isResolved comments(first:50){ nodes { body } } } }
                }
              }
            }`;
            const r = await github.graphql(q, {
              owner: context.repo.owner, repo: context.repo.repo,
              num: context.payload.pull_request.number,
            });
            const threads = r.repository.pullRequest.reviewThreads.nodes.map((t) => ({
              isResolved: t.isResolved,
              comments: t.comments.nodes.map((c) => ({ body: c.body })),
            }));
            require("fs").writeFileSync("/tmp/threads.json", JSON.stringify(threads));

      - name: Reconcile the table against the comments
        if: steps.scope.outputs.ids != ''
        run: |
          [ -f /tmp/threads.json ] || echo "[]" > /tmp/threads.json
          ledgers=""
          for id in ${{ steps.scope.outputs.ids }}; do
            [ -f "audit/$id/ledger.json" ] && ledgers="$ledgers audit/$id/ledger.json"
          done
          [ -z "$ledgers" ] && { echo "no ledgers touched; nothing to reconcile"; exit 0; }
          node .github/scripts/audit-consistency.mjs /tmp/threads.json $ledgers
