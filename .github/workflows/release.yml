name: release

# Changesets-driven release for the khai workspace.
#
# On every push to main:
#   * If unreleased changeset files exist, the action opens/updates a
#     "Version Packages" PR that bumps versions, writes CHANGELOGs, and
#     propagates internal dependency bumps (e.g. an engine that depends on
#     khai-arch). Merging that PR consumes the changesets.
#   * If there are no pending changesets (the version PR was just merged),
#     the action runs `changeset publish`, which publishes every package
#     whose version is not yet on GitHub Packages and pushes its git tag.
#
# ── Token requirements (READ THIS before debugging a 403) ───────────────────
# Every git operation here runs as RELEASE_TOKEN (set on checkout, below):
#   * version run  -> pushes the changeset-release/main branch + opens the PR
#   * publish run  -> pushes the git tags after npm publish
# So RELEASE_TOKEN must be a PAT with BOTH:
#   * Contents: Read and write   (push branches + tags)
#   * Pull requests: Read and write   (open the Version PR)
# A fine-grained PAT must also list ChBrain/khai in its repository access.
#
# If RELEASE_TOKEN lacks Contents: write you get, on EVERY git push:
#     remote: Permission to ChBrain/khai.git denied to <token-owner>.  (403)
# npm publish still succeeds in that case (it uses NODE_AUTH_TOKEN, not git),
# so the packages go live but the branch/tag push fails. The fix is the token
# scope, not this file.
#
# Why a PAT and not the built-in GITHUB_TOKEN: GitHub suppresses workflow runs
# on commits/PRs made by GITHUB_TOKEN (anti-recursion). A bot-authored Version
# PR would never trigger CI, leaving its required checks permanently pending
# and the PR unmergeable. A PAT is a real identity, so CI fires and the PR
# merges green through normal branch protection — no admin bypass.

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    # The changesets bot commits + pushes `changeset-release/main` mechanically.
    # HUSKY=0 keeps `npm ci` from installing the dev git hooks, so the release
    # automation is NOT gated by the (now-enforced) branch-check / source-test
    # split -- those gate human/agent PRs, not the version-bump commit. Without
    # this, the bot's push fails branch-check (changeset-release/* is the bot's
    # branch) and releases lock out. See docs/BRANCHING.md "flip to hard-fail".
    env:
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Persists RELEASE_TOKEN as the git credential for all later pushes
          # (branch + tags). This is the single source of git auth — no manual
          # remote-url rewrite needed.
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://npm.pkg.github.com"
          scope: "@chbrain"
          cache: "npm"
      - name: install
        run: npm ci
      - name: test
        run: npm test
      - name: changesets release
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
        env:
          # PAT for the action's git pushes and for opening the Version PR so
          # CI runs on it. Needs Contents: write + Pull requests: write.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          # npm publish to GitHub Packages uses the built-in token's packages
          # scope — least privilege, and independent of the git-push auth above.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
