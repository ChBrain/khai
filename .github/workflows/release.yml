name: release

# Changesets-driven release for the khai workspace.
#
# On every push to main:
#   * If unreleased changeset files exist, the action opens/updates a
#     "Version Packages" PR that bumps versions, writes CHANGELOGs, and
#     propagates internal dependency bumps (e.g. an engine that depends on
#     khai-arch). Merging that PR consumes the changesets.
#   * If there are no pending changesets (the version PR was just merged),
#     the action runs `changeset publish`, which publishes every package
#     whose version is not yet on GitHub Packages and pushes its git tag.
#
# The Version PR is opened with RELEASE_TOKEN (a PAT), not the default
# GITHUB_TOKEN. GitHub deliberately suppresses workflow runs on commits made
# by GITHUB_TOKEN (anti-recursion), which would leave the Version PR's
# required checks (test, meta-2) permanently pending and unmergeable. A PAT is
# a real identity, so CI fires on the Version PR and it merges green through
# normal branch protection — no admin bypass.

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://npm.pkg.github.com"
          scope: "@chbrain"
          cache: "npm"
      - name: install
        run: npm ci
      - name: test
        run: npm test
      - name: changesets release
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
        env:
          # PAT for opening/updating the Version PR so CI runs on it.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          # Publishing to GitHub Packages uses the workflow token's packages
          # scope (the PAT also works, but GITHUB_TOKEN is the least-privilege
          # choice for the publish step).
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
