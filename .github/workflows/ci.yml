name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: prettier check
        run: npm run format:check
      - name: vitest
        run: npm test

  changeset:
    # Require a changeset whenever a publishable package changes, so the
    # registry can never drift behind source again (the GROW restructure
    # reached main with no version bump and shipped a stale khai-arch@0.0.3).
    # `changeset status --since` exits non-zero if a package changed without
    # an accompanying changeset. For changes that genuinely need no release
    # (tests, tooling), add an empty changeset: `npx changeset add --empty`.
    #
    # Version PRs are exempt: changesets opens them on changeset-release/* and
    # they intentionally consume the changeset while bumping packages, which
    # would otherwise trip this gate and make every release unmergeable.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}
      - name: require a changeset for package changes
        run: npx changeset status --since=origin/${{ github.event.pull_request.base.ref }}

  khai-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: source/test separation gate
        run: npx khai-guard --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"
