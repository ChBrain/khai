name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: prettier check
        run: npm run format:check
      - name: vitest
        run: npm test

  changeset:
    # Require a changeset whenever a publishable package changes, so the
    # registry can never drift behind source again (the GROW restructure
    # reached main with no version bump and shipped a stale khai-arch@0.0.3).
    # `changeset status --since` exits non-zero if a package changed without
    # an accompanying changeset. For changes that genuinely need no release
    # (tests, tooling), add an empty changeset: `npx changeset add --empty`.
    #
    # Version PRs are exempt: changesets opens them on changeset-release/* and
    # they intentionally consume the changeset while bumping packages, which
    # would otherwise trip this gate and make every release unmergeable.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}
      - name: require a changeset for package changes
        run: npx changeset status --since=origin/${{ github.event.pull_request.base.ref }}

  khai-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: source/test separation gate
        run: npx khai-guard --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

  branch-scope:
    # The branch-NAME-to-lane gate (see docs/BRANCHING.md). ADVISORY for now:
    # KHAI_GUARD_BRANCH_ADVISORY=1 makes branch-check print violations but exit
    # 0, so this job never fails the build while the live claude/* branches are
    # being renamed to the lane scheme. It also does NOT make the build fail
    # because it is not (yet) a required status check.
    #
    # TO ENFORCE once branches are renamed (see docs/BRANCHING.md "flip to
    # hard-fail"): (1) remove the KHAI_GUARD_BRANCH_ADVISORY env below so a
    # violation exits 1, and (2) add "branch-scope" to the required status
    # checks in branch protection. No change to @chbrain/khai-guard is needed.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      KHAI_GUARD_BRANCH_ADVISORY: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: branch-scope lane gate (advisory)
        # On a PR, actions/checkout leaves a detached HEAD (the merge commit),
        # so pass the PR head ref via --branch for the lane classification and
        # the PR base/head as the diff range (matching the source/test gate).
        run: npx khai-guard branch-check --branch "${{ github.head_ref }}" --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

  bump-scope:
    # Release-scope flag (the third khai-guard rule; see the bump-check
    # subcommand). patch is free; a changeset declaring minor/major widens the
    # published release and is the maintainer's call. The bot holds the
    # maintainer's credentials, so a hard lock is impossible -- the teeth are
    # LOUDNESS: bump-check prints an unmissable banner + a ::warning::, and this
    # job stamps a bump:minor / bump:major label so the escalation is visible on
    # the PR itself. Advisory: it never fails the build; the banner and label
    # ARE the signal. Release PRs consume changesets, so they're exempt.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: flag non-patch release scope
        id: bump
        run: npx khai-guard bump-check
      - name: stamp the release-scope label
        if: steps.bump.outputs.bump_label != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "${{ steps.bump.outputs.bump_label }}" \
            --repo "${{ github.repository }}" \
            --color FBCA04 \
            --description "Release scope flagged by khai-guard bump-scope (maintainer's call)" \
            --force || true
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "${{ steps.bump.outputs.bump_label }}"
