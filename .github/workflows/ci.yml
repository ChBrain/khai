name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: prettier check
        run: npm run format:check
      - name: vitest
        run: npm test

  meta-2:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: check diff for mixed source/test paths
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # META-2 governs content vs test EDITS, not pure file moves. Pure
          # renames (R100/C100) change no content, so they are exempt; a
          # rename-with-edit is judged by its destination path.
          CHANGED=$(git diff --name-status -M "$BASE" "$HEAD" | awk '
            $1 == "R100" || $1 == "C100" { next }
            $1 ~ /^[RC]/ { print $3; next }
            { print $2 }
          ')

          HAS_SOURCE=0
          HAS_TEST=0

          for f in $CHANGED; do
            case "$f" in
              packages/khai-arch/architecture/*) HAS_SOURCE=1 ;;
              packages/khai-arch/tests/*) HAS_TEST=1 ;;
              .github/workflows/*) HAS_TEST=1 ;;
              .husky/*) HAS_TEST=1 ;;
            esac
          done

          if [ "$HAS_SOURCE" -eq 1 ] && [ "$HAS_TEST" -eq 1 ]; then
            echo "::error::META-2 violation: PR mixes source with test changes"
            echo ""
            echo "  Source paths: packages/khai-arch/architecture/"
            echo "  Test paths:   packages/khai-arch/tests/, .github/workflows/, .husky/"
            echo ""
            echo "  Fix: split into separate PRs (tests first, source second)."
            echo "       If you genuinely need to bundle (rare), admin can use"
            echo "       'Merge without waiting for requirements' on a failed"
            echo "       check - this leaves an explicit audit trail."
            echo "       The body-marker bypass has been removed."
            exit 1
          fi

          echo "META-2 OK: no mixed source/test paths in this PR."
