name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  khai-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: prettier check
        run: npm run format:check
      - name: vitest
        run: npm test

  changeset:
    # Require a changeset whenever a publishable package changes, so the
    # registry can never drift behind source again (the GROW restructure
    # reached main with no version bump and shipped a stale khai-arch@0.0.3).
    # `changeset status --since` exits non-zero if a package changed without
    # an accompanying changeset. For changes that genuinely need no release
    # (tests, tooling), add an empty changeset: `npx changeset add --empty`.
    #
    # Version PRs are exempt: changesets opens them on changeset-release/* and
    # they intentionally consume the changeset while bumping packages, which
    # would otherwise trip this gate and make every release unmergeable.
    # Dependabot PRs are exempt: the bot never writes changesets, and its
    # dep bumps are scoped by the dependabot/* lane (khai-guard.config.json)
    # so they cannot smuggle package changes that need a release entry.
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      !startsWith(github.head_ref, 'changeset-release/') &&
      !startsWith(github.head_ref, 'dependabot/')
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}
      - name: require a changeset for package changes
        run: npx changeset status --since=origin/${{ github.event.pull_request.base.ref }}

  khai-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: source/test separation gate
        run: npx khai-guard --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

  branch-scope:
    # The branch-NAME-to-lane gate (see docs/BRANCHING.md). ENFORCED: a
    # violation exits 1 and fails this job. To make it block merge, add
    # "branch-scope" to the required status checks in branch protection (a
    # repo-admin setting CI cannot set itself). No change to @chbrain/khai-guard
    # is needed: enforce is simply "advisory off".
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: branch-scope lane gate
        # On a PR, actions/checkout leaves a detached HEAD (the merge commit),
        # so pass the PR head ref via --branch for the lane classification and
        # the PR base/head as the diff range (matching the source/test gate).
        #
        # EXEMPT the changesets Version PR. `changeset-release/*` is release
        # automation, not a developer change: it bumps EVERY released package's
        # package.json + CHANGELOG, which is inherently cross-lane and can never
        # satisfy deny-by-default ownership (no allow-list fixes it -- the paths
        # are owned by their own lanes). The job still runs and exits 0, so a
        # required check stays satisfied; it just skips the lane gate.
        run: |
          if [[ "${{ github.head_ref }}" == changeset-release/* ]]; then
            echo "changeset-release/*: release automation, exempt from lane scoping."
            exit 0
          fi
          npx khai-guard branch-check --branch "${{ github.head_ref }}" --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

  license-check:
    # Hard gate: every package.json must declare the dual license and every
    # SKILL.md a NonCommercial CC license. This is the IP protection wall —
    # it stops a bare permissive license (plain MIT, Apache-2.0) from letting
    # khai's concepts ship without the NonCommercial restriction. The hook
    # catches it locally; this gate catches anything that skipped the hook.
    # Policy is in khai-guard.config.json licensePolicy; no diff range needed
    # — license-check scans the full working tree statically.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: license gate
        run: npx khai-guard license-check

  lockfile-scope:
    # Hard gate: exactly one authoritative lockfile — the root package-lock.json.
    # This is an npm-workspaces monorepo, so a lockfile committed inside a package
    # is a fossil that desyncs Dependabot and CI (a stale nested lock pinned an
    # old js-yaml, producing a phantom advisory and a downgrade PR). The hook
    # catches it locally; this gate catches anything that skipped the hook. Policy
    # is in khai-guard.config.json lockfilePolicy; scans the tracked tree
    # statically like license-check, no diff range needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: lockfile gate
        run: npx khai-guard lockfile-check

  bump-scope:
    # Release-scope flag (the third khai-guard rule; see the bump-check
    # subcommand). patch is free; a changeset declaring minor/major widens the
    # published release and is the maintainer's call. The bot holds the
    # maintainer's credentials, so a hard lock is impossible -- the teeth are
    # LOUDNESS: bump-check prints an unmissable banner + a ::warning::, and this
    # job stamps a bump:minor / bump:major label so the escalation is visible on
    # the PR itself. Advisory: it never fails the build; the banner and label
    # ARE the signal. Release PRs consume changesets, so they're exempt.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
      - name: flag non-patch release scope
        id: bump
        run: npx khai-guard bump-check
      - name: stamp the release-scope label
        if: steps.bump.outputs.bump_label != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "${{ steps.bump.outputs.bump_label }}" \
            --repo "${{ github.repository }}" \
            --color FBCA04 \
            --description "Release scope flagged by khai-guard bump-scope (maintainer's call)" \
            --force || true
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "${{ steps.bump.outputs.bump_label }}"
